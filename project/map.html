<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<title>OpenStreetMap LabVIEW</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

/////////////////////////////////////////////////
// INITIAL POSITION
/////////////////////////////////////////////////

var currentLat = 40.1772;
var currentLng = 44.5035;

/////////////////////////////////////////////////
// CREATE MAP
/////////////////////////////////////////////////

var map = L.map('map').setView(
    [currentLat, currentLng],
    15
);

/////////////////////////////////////////////////
// LOAD OPENSTREETMAP
/////////////////////////////////////////////////

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom: 19,
        noWrap: true
    }
).addTo(map);

/////////////////////////////////////////////////
// USER MARKER
/////////////////////////////////////////////////

var marker = L.marker(
    [currentLat, currentLng]
).addTo(map);

var redIcon = new L.Icon({
    iconUrl:
        'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',

    shadowUrl:
        'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',

    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

/////////////////////////////////////////////////
// PATH LINE
/////////////////////////////////////////////////

var pathPoints = [
    [currentLat, currentLng]
];

var polyline = L.polyline(
    pathPoints
).addTo(map);

/////////////////////////////////////////////////
// UPDATE POSITION FUNCTION
/////////////////////////////////////////////////

function updatePosition(lat, lng)
{
    currentLat = lat;
    currentLng = lng;

    marker.setLatLng([lat, lng]);

    map.setView([lat, lng]);

    pathPoints.push([lat, lng]);

    polyline.setLatLngs(pathPoints);
}

/////////////////////////////////////////////////
// ADD BASE STATION
/////////////////////////////////////////////////

function addBaseStation(lat, lng, radius)
{
    L.marker(
    [lat, lng],
    {icon: redIcon}
    ).addTo(map);

    L.circle(
        [lat, lng],
        {
            radius: radius,
            color: 'red'
        }
    ).addTo(map);
}

</script>

</body>
</html>
